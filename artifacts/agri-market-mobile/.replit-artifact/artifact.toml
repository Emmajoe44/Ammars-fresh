kind = "mobile"
previewPath = "/mobile/"
title = "AgriMarket Mobile"
version = "1.0.0"
id = "artifacts/agri-market-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18431

[services.development]
run = "pnpm --filter @workspace/agri-market-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agri-market-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/agri-market-mobile", "run", "serve" ]

[services.env]
PORT = "18431"
BASE_PATH = "/mobile/"
